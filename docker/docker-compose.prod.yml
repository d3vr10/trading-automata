name: trading-automata

# DEPLOYMENT: Load environment variables from docker/.env.prod
# Run from project root:
#   docker-compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml up -d
#
# Environment variables used:
#   - TRAEFIK_HOSTNAME: Domain for HTTPS (e.g., hermes-bot.dynv6.net)
#   - LETSENCRYPT_EMAIL: Email for Let's Encrypt cert registration

services:
  # Traefik Reverse Proxy with Let's Encrypt + Self-Signed Fallback
  traefik:
    image: traefik:v3.0
    container_name: trading-automata-traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file: .env.prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    command:
      # Global settings
      - "--global.checkNewVersion=false"
      - "--global.sendAnonymousUsage=false"

      # Logging
      - "--log.level=INFO"

      # Entrypoints
      - "--entrypoints.http.address=:80"
      - "--entrypoints.websecure.address=:443"

      # HTTP to HTTPS redirect
      - "--entrypoints.http.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.http.http.redirections.entrypoint.scheme=https"

      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"

      # Certificate Resolvers
      # Primary: Let's Encrypt with HTTP challenge
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=http"

      # TLS Configuration: Use Let's Encrypt; Traefik auto-generates self-signed as fallback
      - "--entrypoints.websecure.http.tls.certResolver=letsencrypt"
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # PostgreSQL Database (production config)
  postgres:
    image: postgres:17-alpine
    container_name: trading-automata-db
    env_file: .env.prod
    # Hide database port on production
    ports: []
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading-automata"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # TradingAutomata Application (production config)
  trading-automata:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: trading-automata-app
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    # More resources for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    networks:
      - traefik-network
    labels:
      # Traefik container discovery
      - "traefik.enable=true"
      # Webhook route: /webhook/* → port 8080
      - "traefik.http.routers.trading-automata-webhook.rule=Host(`${TRAEFIK_HOSTNAME:-TRAEFIK_HOSTNAME_NOT_SET}`) && PathPrefix(`/webhook/`)"
      - "traefik.http.routers.trading-automata-webhook.entrypoints=websecure"
      - "traefik.http.routers.trading-automata-webhook.service=trading-automata-webhook"
      - "traefik.http.routers.trading-automata-webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.trading-automata-webhook.loadbalancer.server.port=8080"
    volumes:
      - ./logs:/app/logs
      - ../config:/app/config
      - cache_data:/app/data/cache
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  postgres_data:
    driver: local
  cache_data:
    driver: local
  traefik_certs:
    driver: local

networks:
  traefik-network:
    external: true
    name: traefik-network
