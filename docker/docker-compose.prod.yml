name: trading-bot

services:
  # PostgreSQL Database (production config)
  postgres:
    image: postgres:17-alpine
    container_name: trading-bot-db
    env_file: .env.prod
    # Hide database port on production
    ports: []
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Trading Bot Application (production config)
  trading-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: trading-bot-app
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    # More resources for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    networks:
      - traefik-network
    labels:
      # Traefik container discovery
      - "traefik.enable=true"
      # Webhook route: /webhook/* → port 8080
      - "traefik.http.routers.trading-bot-webhook.rule=Host(`hermes-bot.dynv6.net`) && PathPrefix(`/webhook/`)"
      - "traefik.http.routers.trading-bot-webhook.entrypoints=websecure"
      - "traefik.http.routers.trading-bot-webhook.service=trading-bot-webhook"
      - "traefik.http.routers.trading-bot-webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.trading-bot-webhook.loadbalancer.server.port=8080"
    volumes:
      - ./logs:/app/logs
      - ../config:/app/config
      - cache_data:/app/data/cache
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  postgres_data:
    driver: local
  cache_data:
    driver: local

networks:
  traefik-network:
    external: true
    name: traefik-network
