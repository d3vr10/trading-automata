name: trading-automata

# DEPLOYMENT: Load environment variables from docker/.env.prod
# Run from project root:
#   docker-compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml up -d

services:
  # Traefik Reverse Proxy with Let's Encrypt
  traefik:
    image: traefik:v3.0
    container_name: trading-automata-traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file: .env.prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    command:
      - "--global.checkNewVersion=false"
      - "--global.sendAnonymousUsage=false"
      - "--log.level=INFO"
      - "--entrypoints.http.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.http.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.http.http.redirections.entrypoint.scheme=https"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=http"
      - "--entrypoints.websecure.http.tls.certResolver=letsencrypt"
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # PostgreSQL Database (production)
  postgres:
    image: postgres:17-alpine
    container_name: trading-automata-db
    env_file: .env.prod
    ports: []
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading-automata"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Redis (production)
  redis:
    image: redis:7-alpine
    container_name: trading-automata-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports: []
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Trading Engine (production)
  trading-engine:
    build:
      context: ..
      dockerfile: services/trading-engine/Dockerfile
    container_name: trading-automata-engine
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    volumes:
      - ./logs:/app/logs
      - ../config:/app/config
      - cache_data:/app/data/cache
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # API Service (production)
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: trading-automata-api
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${TRAEFIK_HOSTNAME:-TRAEFIK_HOSTNAME_NOT_SET}`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      # Webhook route (Telegram, preserved)
      - "traefik.http.routers.webhook.rule=Host(`${TRAEFIK_HOSTNAME:-TRAEFIK_HOSTNAME_NOT_SET}`) && PathPrefix(`/webhook/`)"
      - "traefik.http.routers.webhook.entrypoints=websecure"
      - "traefik.http.routers.webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.webhook.loadbalancer.server.port=8080"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Web UI (production)
  web-ui:
    build:
      context: ../services/web-ui
      dockerfile: Dockerfile
    container_name: trading-automata-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: https://${TRAEFIK_HOSTNAME:-localhost}/api
      NEXT_PUBLIC_WS_URL: wss://${TRAEFIK_HOSTNAME:-localhost}/api/ws
    restart: always
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${TRAEFIK_HOSTNAME:-TRAEFIK_HOSTNAME_NOT_SET}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      # Lower priority than api and webhook routes
      - "traefik.http.routers.web.priority=1"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Prometheus (metrics collection)
  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: trading-automata-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
      - trading-engine
    restart: always
    networks:
      - traefik-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Grafana (dashboards — auto-provisioned)
  grafana:
    image: grafana/grafana:12.3.1
    container_name: trading-automata-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${TRAEFIK_HOSTNAME:-localhost}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: always
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${TRAEFIK_HOSTNAME:-TRAEFIK_HOSTNAME_NOT_SET}`) && PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  cache_data:
    driver: local
  traefik_certs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  traefik-network:
    external: true
    name: traefik-network
