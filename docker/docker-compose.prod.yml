services:
  # PostgreSQL Database (production config)
  postgres:
    env_file: .env.prod
    # Hide database port on production
    ports: []
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Trading Bot Application (production config)
  trading-bot:
    env_file: .env.prod
    # Expose port 8080 only internally (to Nginx)
    ports:
      - "127.0.0.1:8080:8080"
    restart: always
    # More resources for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Nginx reverse proxy with TLS
  nginx:
    image: nginx:alpine
    container_name: trading-bot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - trading-bot
    networks:
      - trading-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Let's Encrypt certificate management
  certbot:
    image: certbot/certbot
    container_name: trading-bot-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Renew certificates automatically every 12 hours
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;"
    depends_on:
      - nginx
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  postgres_data:
    driver: local
  cache_data:
    driver: local
  certbot_certs:
    driver: local
  certbot_webroot:
    driver: local

networks:
  trading-network:
    driver: bridge
