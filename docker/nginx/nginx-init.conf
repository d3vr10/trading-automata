events { worker_connections 1024; }

http {
    # HTTP-only config for initial Let's Encrypt cert challenge
    server {
        listen 80;
        server_name hermes-bot.dynv6.net;

        # Let's Encrypt challenge endpoint
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # All other requests return 200 OK
        location / {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
