events { worker_connections 1024; }

http {
    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name hermes-bot.dynv6.net;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS reverse proxy to trading-bot
    server {
        listen 443 ssl;
        server_name hermes-bot.dynv6.net;

        # TLS certificates
        ssl_certificate     /etc/letsencrypt/live/hermes-bot.dynv6.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hermes-bot.dynv6.net/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Telegram webhook endpoint
        location /webhook/ {
            proxy_pass         http://trading-bot:8080/webhook/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
