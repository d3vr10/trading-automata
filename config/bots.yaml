# Trading Engine Configuration
#
# Global settings for the trading engine.
# Bot instances are now created via the API (web UI, CLI, or Telegram).
#
# Precedence: environment variables > YAML values > pydantic defaults
# Use ${ENV_VAR} syntax to reference environment variables

global:
  database_url: "postgresql://postgres:postgres@postgres:5432/trading_automata"
  telegram_token: "${TELEGRAM_TOKEN}"
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"
  telegram_username_whitelist: "your_username,another_user"
  telegram_webhook_url: ""
  telegram_webhook_secret: ""
  telegram_webhook_port: 8080
  log_level: "INFO"
  log_file: "logs/trading_automata.log"
  database_pool_size: 10
  database_max_overflow: 20
  health_check_interval: 300
  use_cached_data: true
