strategies:
  # ============================================================
  # STOCK STRATEGIES (Alpaca) — disabled for Coinbase setup
  # ============================================================

  - name: "buy_hold_spy"
    class: "BuyAndHoldStrategy"
    enabled: false
    symbols:
      - "SPY"
    parameters:
      quantity: 4

  - name: "mean_reversion_spy"
    class: "MeanReversionStrategy"
    enabled: false
    symbols:
      - "SPY"
    parameters:
      window: 20
      num_std: 2
      position_size: 4

  - name: "momentum_qqq"
    class: "MomentumStrategy"
    enabled: false
    symbols:
      - "QQQ"
    parameters:
      lookback_period: 14
      momentum_threshold: 0.02
      position_size: 2

  - name: "rsi_atr_trend_spy"
    class: "RSIATRTrendStrategy"
    enabled: false
    symbols:
      - "SPY"
    parameters:
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      atr_period: 14
      atr_multiplier: 1.5
      ema_fast_period: 9
      ema_slow_period: 21
      position_size: 4
      risk_reward_ratio: 2.0
      max_daily_loss_pips: 100
      signal_cooldown_bars: 3
    filters:
      min_volume: 1000000
      min_atr: 0.5
      max_atr: 5.0

  # ============================================================
  # CRYPTO STRATEGIES (Coinbase)
  # ============================================================
  # Position sizes are in base currency units (e.g., 0.001 = 0.001 BTC).
  # The VirtualPortfolioManager will cap positions based on bot allocation,
  # so these act as maximum per-trade quantities.
  #
  # Symbol format: use base symbol (e.g., "BTC") — the Coinbase data
  # provider automatically appends "-USD".
  # ============================================================

  # --- BTC: Sigma Alpha Bull Crypto (trend following, long-only) ---
  # Crypto-tuned version of Sigma Alpha Bull with wider RSI zones,
  # lower ADX threshold, wider ATR stops/targets for crypto volatility.
  - name: "sigma_bull_btc"
    class: "SigmaSeriesAlphaBullCryptoStrategy"
    enabled: true
    symbols:
      - "BTC"
    parameters:
      position_size: 0.001       # ~$84 at current prices

  # --- ETH: Sigma Alpha (mean-reversion) ---
  # ETH tends to mean-revert around key levels more than BTC.
  # Bollinger Band + RSI extremes for entries, hold until TP/SL.
  - name: "sigma_alpha_eth"
    class: "SigmaSeriesAlphaStrategy"
    enabled: true
    symbols:
      - "ETH"
    parameters:
      position_size: 0.01        # ~$20 at current prices

  # --- SOL: Sigma Fast (momentum) ---
  # SOL has high intraday volatility and volume spikes — good fit
  # for the fast momentum strategy with tight SL/TP.
  - name: "sigma_fast_sol"
    class: "SigmaSeriesFastStrategy"
    enabled: true
    symbols:
      - "SOL"
    parameters:
      position_size: 0.5         # ~$65 at current prices

  # --- BTC: RSI+ATR Trend (crypto-tuned) ---
  # Classic RSI oversold/overbought with ATR-based risk sizing.
  # Wider ATR filters to match crypto volatility.
  - name: "rsi_atr_trend_btc"
    class: "RSIATRTrendStrategy"
    enabled: true
    symbols:
      - "BTC"
    parameters:
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      atr_period: 14
      atr_multiplier: 1.5
      ema_fast_period: 9
      ema_slow_period: 21
      position_size: 0.001       # ~$84 at current prices
      risk_reward_ratio: 2.0
      max_daily_loss_pips: 500   # Wider for crypto
      signal_cooldown_bars: 3
    filters:
      min_volume: 50000          # Crypto volume (in base units)
      min_atr: 100               # BTC moves $100+ per bar easily
      max_atr: 3000              # Avoid extreme volatility days
