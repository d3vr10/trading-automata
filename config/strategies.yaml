  #     max_daily_loss_pips: 100
  #     signal_cooldown_bars: 3
  #   filters:
  #     min_volume: 1000000  # Stocks need higher volume
  #     min_atr: 0.5         # ATR in dollars for stocks (e.g., 50 cents)
  #     max_atr: 5.0         # Avoid huge volatility

