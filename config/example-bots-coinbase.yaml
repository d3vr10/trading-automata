# Example Multi-Bot Configuration for Coinbase Trading
#
# Copy to config/bots.yaml and customize for your setup
#
# Key Concepts:
# - global: Shared settings for all bots (database, Telegram, logging)
# - bots: List of trading bots, each with independent broker + allocation + strategy
# - allocation: Virtual capital pool for this bot (enforced by hard/soft fence)
# - fence: Prevents over-allocation (hard=strict, soft=warning)
# - risk: Stop loss %, take profit %, position sizing limits
# - trade_frequency: How often to check for signals (poll_interval_minutes)
#
# Environment Variables:
# Use ${VAR_NAME} syntax to reference environment variables
# Example: api_key: "${COINBASE_API_KEY}" reads from .env or shell

# ============================================================================
# GLOBAL CONFIGURATION - Applied to All Bots
# ============================================================================
global:
  # Database connection
  database_url: "${DATABASE_URL}"

  # Telegram notifications (optional but recommended)
  telegram_token: "${TELEGRAM_BOT_TOKEN}"
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"

  # Logging
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_file: "logs/trading_automata.log"

  # Health checks
  health_check_interval: 300  # seconds (5 minutes)

# ============================================================================
# BOT CONFIGURATIONS
# ============================================================================
bots:
  # =========================================================================
  # EXAMPLE 1: Single Conservative Bot (Recommended Starting Point)
  # =========================================================================
  - name: "coinbase_conservative"
    enabled: true
    description: "Conservative mean-reversion bot on major pairs"

    # Broker: Coinbase Advanced Trading API
    broker:
      type: "coinbase"
      api_key: "${COINBASE_API_KEY}"
      secret_key: "${COINBASE_SECRET_KEY}"
      passphrase: "${COINBASE_PASSPHRASE}"

    # Capital Allocation: $500 virtual budget for this bot
    allocation:
      type: "dollars"      # or "shares" for stock fractional allocation
      amount: 500.00       # Start small! Increase after 1 week of profitable trading

    # Fence: Hard limit prevents exceeding allocated capital
    fence:
      type: "hard"         # "hard" (strict) or "soft" (warning + allow overage)
      overage_pct: 0.0     # Only used with soft fence (e.g., 0.05 = 5% overage allowed)

    # Risk Management: Applied per signal
    risk:
      stop_loss_pct: 2.0         # Stop loss 2% below entry
      take_profit_pct: 6.0       # Take profit 6% above entry
      max_position_size: 250.00  # Single position max $250 (50% of allocation)
      max_portfolio_risk: 5.0    # Risk no more than 5% of total capital per trade

    # Trading Frequency: How often to check for signals
    trade_frequency:
      poll_interval_minutes: 5   # Check for signals every 5 minutes

    # Strategy Configuration: Path to strategy YAML file
    strategy_config: "config/strategies.yaml"

    # Data Provider: Where to get market data (separate from broker)
    data_provider:
      type: "alpaca"             # Use Alpaca for market data
      api_key: "${ALPACA_API_KEY}"
      secret_key: "${ALPACA_SECRET_KEY}"


  # =========================================================================
  # EXAMPLE 2: Aggressive Momentum Bot (Comment out to disable)
  # =========================================================================
  - name: "coinbase_momentum"
    enabled: false                # Change to true to enable
    description: "Aggressive momentum bot for quick trades"

    broker:
      type: "coinbase"
      api_key: "${COINBASE_API_KEY}"
      secret_key: "${COINBASE_SECRET_KEY}"
      passphrase: "${COINBASE_PASSPHRASE}"

    allocation:
      type: "dollars"
      amount: 300.00              # $300 smaller allocation for aggressive trading

    fence:
      type: "hard"
      overage_pct: 0.0

    risk:
      stop_loss_pct: 1.5          # Tighter stop loss (1.5%)
      take_profit_pct: 3.0        # Quick profits (3%)
      max_position_size: 100.00   # Smaller positions ($100 max)
      max_portfolio_risk: 3.0     # Lower risk tolerance (3%)

    trade_frequency:
      poll_interval_minutes: 1    # Check every 1 minute (more signals)

    strategy_config: "config/strategies.yaml"

    data_provider:
      type: "alpaca"
      api_key: "${ALPACA_API_KEY}"
      secret_key: "${ALPACA_SECRET_KEY}"


  # =========================================================================
  # EXAMPLE 3: Bull Market Bot (Long-only Trend Following)
  # =========================================================================
  - name: "coinbase_bull"
    enabled: false                # Enable during confirmed bull markets
    description: "Long-only trend following in strong uptrends (96%+ win target)"

    broker:
      type: "coinbase"
      api_key: "${COINBASE_API_KEY}"
      secret_key: "${COINBASE_SECRET_KEY}"
      passphrase: "${COINBASE_PASSPHRASE}"

    allocation:
      type: "dollars"
      amount: 1000.00             # Larger allocation for trend-following

    fence:
      type: "hard"
      overage_pct: 0.0

    risk:
      stop_loss_pct: 1.0          # Very tight stop loss (1%)
      take_profit_pct: 4.0        # Ride trends (4% target)
      max_position_size: 500.00   # Can hold larger positions
      max_portfolio_risk: 5.0

    trade_frequency:
      poll_interval_minutes: 5    # Slower polling for trend confirmation

    strategy_config: "config/strategies.yaml"

    data_provider:
      type: "alpaca"
      api_key: "${ALPACA_API_KEY}"
      secret_key: "${ALPACA_SECRET_KEY}"


  # =========================================================================
  # EXAMPLE 4: Soft Fence Bot (Warning-Only, Allows Overage)
  # =========================================================================
  - name: "coinbase_experimental"
    enabled: false                # Experimental setup, not recommended for live
    description: "Testing soft fence behavior (logs warning, allows overage)"

    broker:
      type: "coinbase"
      api_key: "${COINBASE_API_KEY}"
      secret_key: "${COINBASE_SECRET_KEY}"
      passphrase: "${COINBASE_PASSPHRASE}"

    allocation:
      type: "dollars"
      amount: 200.00

    fence:
      type: "soft"                # Soft fence: warnings + allows overage
      overage_pct: 0.10           # Allow up to 10% overage (200 → 220 max)

    risk:
      stop_loss_pct: 2.5
      take_profit_pct: 5.0
      max_position_size: 150.00
      max_portfolio_risk: 5.0

    trade_frequency:
      poll_interval_minutes: 5

    strategy_config: "config/strategies.yaml"

    data_provider:
      type: "alpaca"
      api_key: "${ALPACA_API_KEY}"
      secret_key: "${ALPACA_SECRET_KEY}"


  # =========================================================================
  # EXAMPLE 5: Multi-Asset Bot (Multiple Trading Pairs)
  # =========================================================================
  - name: "coinbase_multi_asset"
    enabled: false                # Requires strategy_config to include multiple symbols
    description: "Trading multiple crypto pairs (BTC, ETH, SOL, etc.)"

    broker:
      type: "coinbase"
      api_key: "${COINBASE_API_KEY}"
      secret_key: "${COINBASE_SECRET_KEY}"
      passphrase: "${COINBASE_PASSPHRASE}"

    allocation:
      type: "dollars"
      amount: 2000.00             # Larger allocation spread across multiple positions

    fence:
      type: "hard"
      overage_pct: 0.0

    risk:
      stop_loss_pct: 2.0
      take_profit_pct: 6.0
      max_position_size: 400.00   # Individual position limit
      max_portfolio_risk: 5.0     # Total portfolio risk limit

    trade_frequency:
      poll_interval_minutes: 2

    strategy_config: "config/strategies.yaml"

    data_provider:
      type: "alpaca"
      api_key: "${ALPACA_API_KEY}"
      secret_key: "${ALPACA_SECRET_KEY}"

# ============================================================================
# NOTES FOR FIRST DEPLOYMENT
# ============================================================================
#
# 1. ENABLE ONLY ONE BOT FIRST
#    - Uncomment coinbase_conservative only
#    - Set enabled: true
#    - Disable all others (enabled: false)
#
# 2. START WITH SMALL ALLOCATION
#    - Use $100-$500 for first week
#    - Increase only after 7+ days of profitable trading
#
# 3. HARD FENCE IS REQUIRED
#    - type: "hard" prevents over-allocation
#    - Soft fence is experimental only
#
# 4. ENVIRONMENT VARIABLES REQUIRED
#    Create .env file with:
#    - COINBASE_API_KEY=xxx
#    - COINBASE_SECRET_KEY=xxx
#    - COINBASE_PASSPHRASE=xxx
#    - DATABASE_URL=postgresql://...
#    - TELEGRAM_BOT_TOKEN=xxx (optional but recommended)
#    - TELEGRAM_CHAT_ID=xxx (optional but recommended)
#    - ALPACA_API_KEY=xxx (for market data)
#    - ALPACA_SECRET_KEY=xxx (for market data)
#
# 5. VERIFY CONFIGURATION
#    Run: python -c "from trading_automata.config.loader import load_bot_configs; load_bot_configs()"
#    Should show no errors
#
# 6. RUN DATABASE MIGRATION
#    alembic upgrade 003
#    This adds bot_name columns needed for multi-bot tracking
#
# 7. START BOT
#    python -m trading_automata.main
#    Should show: "Multi-bot mode detected - using BotOrchestrator"
#
# 8. MONITOR TELEGRAM (recommended)
#    Set up bot notifications and run:
#    /status
#    /bots
#    /metrics
#
# ============================================================================
# RISK PARAMETERS EXPLAINED
# ============================================================================
#
# stop_loss_pct: 2.0
#   Entry at $100, stop loss at $98 (100 * (1 - 0.02))
#   If price drops 2%, position is automatically closed for loss
#
# take_profit_pct: 6.0
#   Entry at $100, take profit at $106 (100 * (1 + 0.06))
#   If price rises 6%, position is automatically closed for profit
#
# max_position_size: 250.00
#   Single order cannot exceed $250 even if allocation is $1000
#   Example: allocation $500, max_position_size $250 → max 1 position
#
# max_portfolio_risk: 5.0
#   Total risk on active positions cannot exceed 5% of allocation
#   Example: allocation $500, max risk = $25
#   Two positions with $10 risk each = $20 total (OK)
#   Cannot open third position with $10 risk (would be $30 total = 6%)
#
# ============================================================================
# FENCE BEHAVIOR
# ============================================================================
#
# HARD FENCE (Recommended - type: "hard")
#   - Allocation: $500
#   - Buy order for $350: ALLOWED (350 < 500)
#   - Buy order for $600: REJECTED (600 > 500)
#   - Sells always allowed (reduces allocation usage)
#   - Result: Virtual capital never exceeds allocation
#
# SOFT FENCE (Experimental - type: "soft", overage_pct: 0.05)
#   - Allocation: $500, overage: 5%
#   - Max spend: $525 (500 * 1.05)
#   - Buy order for $400: ALLOWED (400 < 525)
#   - Buy order for $550: ALLOWED with WARNING (550 > 525 but < 650)
#   - Buy order for $600: REJECTED (600 > 525)
#   - Use for testing only - risky for live trading
#
# ============================================================================
# STRATEGY SELECTION
# ============================================================================
#
# Edit config/strategies.yaml to enable desired strategies per bot:
#
# SigmaSeriesFastStrategy (93-94% win target)
#   - Best for: High-volume momentum trading
#   - Entry: Price crosses VWAP with volume spike
#   - Hold time: Max 10 bars
#   - Risk: Tight (SL 0.5x ATR, TP 1.5x ATR)
#   - Frequency: 2-5 signals/day
#   - Best assets: BTC-USD, ETH-USD (liquid pairs)
#
# SigmaSeriesAlphaStrategy (Conservative mean-reversion)
#   - Best for: Steady, predictable growth
#   - Entry: Price at Bollinger Band extremes + momentum confirmation
#   - Hold time: Until TP or SL
#   - Risk: Medium (SL 1.5x ATR, TP 3.0x ATR)
#   - Frequency: 1-3 signals/day
#   - Best assets: Any with sufficient volume (BTC, ETH, SOL)
#
# SigmaSeriesAlphaBullStrategy (96.25% win target in bull markets)
#   - Best for: Trend following during uptrends
#   - Entry: Triple EMA stack + ADX confirmation
#   - Hold time: Until trend reversal detected
#   - Risk: Tight (SL 1.0x ATR, TP 4.0x ATR)
#   - Frequency: 0-2 signals/day
#   - Best assets: BTC-USD (macro trends)
#   - IMPORTANT: Long-only strategy - disable in bear markets
#
# ============================================================================
